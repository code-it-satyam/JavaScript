<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h2>currency converter</h2>
        <form>
            <div class="amount">
                <p>enter amount</p>
                <input value="1" type="text">
            </div>
            <div class="dropdown">
                <div class="from">
                    <p>from</p>
                    <div class="select-container">
                        <img src="https://flagsapi.com/US/flat/64.png" alt="">
                        <select name="from" id="">
                        </select>
                    </div>
                </div>

                <div class="to">
                    <p>to</p>
                    <div class="select-container">
                        <img src="https://flagsapi.com/IN/flat/64.png">
                        <select name="to" id="">
                        </select>
                    </div>
                </div>

                
            </div>
            <div class="msg">
                    <p>1 usd = 80 inr</p>
            </div>
            <button>get exchange rates</button>
        </form>
    </div>
    
    <script src="codes.js"></script>
    <script src="app.js"></script>
</body>
</html>
